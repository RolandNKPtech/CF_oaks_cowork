name = "oaks-plastic-surgery"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "404-page"

# --- D1 Database ---
[[d1_databases]]
binding = "DB"
database_name = "oaks-test-db"
database_id = "824a3b0d-382a-4dfe-a6da-8aac1e65950d"

# --- R2 Object Storage (gallery images, media) ---
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "oaks-test-media"

# --- KV Namespace (sessions, cache) ---
[[kv_namespaces]]
binding = "SESSIONS"
id = "7f07e42e953c4d228850bd7af84f1e7a"

[observability]
enabled = true
